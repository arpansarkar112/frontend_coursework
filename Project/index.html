<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css" >
    <title>Manchester City F.C.</title>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">MCFC</div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#squad">Squad</a></li>
                <li><a href="#stadium">Stadium</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="home" class="parallax-hero">
            <div class="ptext">
                <span class="border">Best Football Club</span>
            </div>
        </section>
        <section id="squad" class="grid-section">
            <h2>The Squad</h2>
            <div class="grid-container">
                <div class="grid-item">Kevin De Bruyne</div>
                <div class="grid-item">Erling Haaland</div>
                <div class="grid-item">Phil Foden</div>
                <div class="grid-item">Rúben Dias</div>
            </div>
        </section>
        <section id="stadium" class="slideshow-section">
            <h2>The Stadium</h2>
            <div class="slideshow-container">
                <div class="mySlides fade">
                    <img src="https://images.unsplash.com/photo-1714213450890-3f465d40ed46?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8ZXRpaGFkJTIwc3RhZGl1bXxlbnwwfHwwfHx8MA%3D%3D" alt="Football on Pitch">
                    <div class="caption">The Etihad Stadium</div>
                </div>
            </div>
        </section>
    </main>
    <script src="./Js/main.js"></script>
</body>
</html>
